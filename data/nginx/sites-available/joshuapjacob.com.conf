server {
	listen 443 ssl http2;
	listen [::]:443 ssl http2;

	server_name joshuapjacob.com;
	root /var/www/joshuapjacob.com/public;

	# SSL
	ssl_certificate /etc/letsencrypt/live/joshuapjacob.com/fullchain.pem;
	ssl_certificate_key /etc/letsencrypt/live/joshuapjacob.com/privkey.pem;
	ssl_trusted_certificate /etc/letsencrypt/live/joshuapjacob.com/chain.pem;

	# security
	include nginxconfig.io/security.conf;

	# index.html fallback
	location / {
		try_files $uri $uri/ /index.html;
	}

	# reverse proxy
	location / {
		proxy_pass http://127.0.0.1:3000;
		include nginxconfig.io/proxy.conf;
	}

	# additional config
	include nginxconfig.io/general.conf;
}

# subdomains redirect
server {
	listen 443 ssl http2;
	listen [::]:443 ssl http2;

	server_name *.joshuapjacob.com;

	# SSL
	ssl_certificate /etc/letsencrypt/live/joshuapjacob.com/fullchain.pem;
	ssl_certificate_key /etc/letsencrypt/live/joshuapjacob.com/privkey.pem;
	ssl_trusted_certificate /etc/letsencrypt/live/joshuapjacob.com/chain.pem;

	# Let’s Encrypt best-practice HTTPS configurations for nginx
	include /etc/letsencrypt/options-ssl-nginx.conf;
	ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

	return 301 https://joshuapjacob.com$request_uri;
}

# HTTP redirect
server {
	listen 80;
	listen [::]:80;

	server_name .joshuapjacob.com;

	include nginxconfig.io/letsencrypt.conf;

	location / {
		return 301 https://joshuapjacob.com$request_uri;
	}

	# Certbot Challenge Files
	location /.well-known/acme-challenge/ {
    root /var/www/certbot;
}
}
