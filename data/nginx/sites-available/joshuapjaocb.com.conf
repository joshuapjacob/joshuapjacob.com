server {
	listen 443 ssl http2;
	listen [::]:443 ssl http2;

	server_name www.joshuapjaocb.com;
	root /var/www/joshuapjaocb.com/public;

	# SSL
	ssl_certificate /etc/letsencrypt/live/joshuapjaocb.com/fullchain.pem;
	ssl_certificate_key /etc/letsencrypt/live/joshuapjaocb.com/privkey.pem;
	ssl_trusted_certificate /etc/letsencrypt/live/joshuapjaocb.com/chain.pem;

	# security
	include nginxconfig.io/security.conf;


	# best-practice HTTPS configurations for nginx
	include /etc/letsencrypt/options-ssl-nginx.conf;
	ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

	# index.html fallback
	location / {
		try_files $uri $uri/ /index.html;
	}

	# reverse proxy
	location / {
		proxy_pass http://127.0.0.1:3000;
		include nginxconfig.io/proxy.conf;
	}

	# additional config
	include nginxconfig.io/general.conf;
}

# non-www, subdomains redirect
server {
	listen 443 ssl http2;
	listen [::]:443 ssl http2;

	server_name .joshuapjaocb.com;

	# SSL
	ssl_certificate /etc/letsencrypt/live/joshuapjaocb.com/fullchain.pem;
	ssl_certificate_key /etc/letsencrypt/live/joshuapjaocb.com/privkey.pem;
	ssl_trusted_certificate /etc/letsencrypt/live/joshuapjaocb.com/chain.pem;

	return 301 https://www.joshuapjaocb.com$request_uri;
}

# HTTP redirect
server {
	listen 80;
	listen [::]:80;

	server_name .joshuapjaocb.com;

	include nginxconfig.io/letsencrypt.conf;

	location / {
		return 301 https://www.joshuapjaocb.com$request_uri;
	}

	location /.well-known/acme-challenge/ {
    	root /var/www/certbot;
	}
}
