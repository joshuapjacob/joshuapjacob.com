server {

  listen 80;
  listen [::]:80;

  location / {
    root   /usr/share/nginx/html;
    index  index.html index.htm;
    try_files $uri $uri/ /index.html;
  }

  server_name joshuapjacob.com www.joshuapjacob.com;

  error_page   500 502 503 504  /50x.html;

  location = /50x.html {
    root   /usr/share/nginx/html;
  }

  location ^~ /.well-known {
    allow all;
    root  /data/letsencrypt/;
  }

}